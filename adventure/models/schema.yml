version: 2

models:

  # ========== FACT TABLE ==========
  - name: fact_sales
    description: >
      Central fact table capturing all sales transactions with associated dimensions.
      One row per order-product combination with metrics, temporal context, and quality ratings.
    columns:
      - name: sales_id
        description: Unique surrogate key for each sales fact record.
        tests:
          - unique
          - not_null
      - name: Order_id
        description: Order identifier from source system.
        tests:
          - not_null
      - name: Customer_id
        description: Customer identifier from source system.
        tests:
          - not_null
      - name: Date_id
        description: Foreign key to Date_Table dimension.
        tests:
          - not_null
      - name: Product_id
        description: Product identifier from source system.
        tests:
          - not_null
      - name: Review_id
        description: Foreign key to Review dimension (0 if no review exists).
      - name: Activity_id
        description: Foreign key to web activity dimension (reserved for future use).
      - name: Quantity
        description: Number of units ordered.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: Total_amount
        description: Total order amount.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: Product_price
        description: Unit price of the product at order time.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: Avg_product_rating
        description: Average rating for this product (0 if no reviews).
      - name: Avg_customer_rating
        description: Average rating given by this customer (0 if no reviews).
      - name: Customer_order_count
        description: Total number of orders placed by this customer.
      - name: PaymentMethod
        description: Payment method used for the order.
      - name: created_at
        description: Timestamp when the record was created.
      - name: updated_at
        description: Timestamp when the record was last updated.

  - name: fact_reviews
    description: >
      Contains summarized product reviews with aggregate ratings and review text.
    columns:
      - name: Product_id
        description: Product identifier.
        tests:
          - unique
          - not_null
      - name: avg_rating
        description: Average rating for this product.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
      - name: Total_reviews
        description: Total number of reviews for this product.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: Review_text
        description: Concatenated review texts for the product.

  - name: fact_webtraffic
    description: >
      Web traffic table aggregating customer interactions by page and action type.
    columns:
      - name: Customer_id
        description: Customer identifier.
        tests:
          - not_null
      - name: Page
        description: Web page visited.
        tests:
          - not_null
      - name: Action_taken
        description: Type of action taken (click, view, purchase, etc.).
        tests:
          - not_null
      - name: Action_count
        description: Number of times this action was taken on this page by this customer.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: fact_platform_sentiments
    description: >
      Platform sentiments table aggregating sentiment data by social media platform.
    columns:
      - name: Platform
        description: Social media platform name.
        tests:
          - not_null
      - name: Sentiment
        description: Sentiment classification (positive, negative, neutral).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['positive', 'negative', 'neutral']
      - name: Sentiment_count
        description: Number of posts with this sentiment on this platform.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 2

  # ========== DIMENSION TABLES ==========
  - name: dim_date
    description: >
      Date dimension providing temporal attributes for analysis by year, quarter, month, week, and day.
      One row per unique calendar date.

    columns:
      - name: date_id
        description: >
          Surrogate key generated using row_number() to uniquely identify each date.
        tests:
          - unique
          - not_null

      - name: Order_date
        description: Original calendar date extracted from the orders table.
        tests:
          - unique
          - not_null

      - name: order_year
        description: Numeric year extracted from Order_date.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 2000

      - name: Quarter
        description: Quarter of the year (1–4).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: [1, 2, 3, 4]

      - name: Order_month
        description: Month of the year (1–12).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 12

      - name: Order_day
        description: Day of the month (1–31).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 31

      - name: Day_abbr
        description: Abbreviated day-of-week name (e.g., Mon, Tue, Wed).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']

      - name: Day_of_the_year
        description: Numeric day number of the year (1–365/366).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 366

      - name: Week
        description: Week number of the year as defined by system calendar.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 53

  - name: dim_social_media
    description: >
      Standardized social media events table generated from the raw social media dataset.
      Performs cleaning, normalization, and sentiment recategorization into the canonical
      classes: positive, negative, and neutral. This model prepares raw social media posts
      for downstream sentiment analysis and platform-level aggregations.

    columns:
      - name: event_ts
        description: >
          Timestamp of the social media post, converted to a timezone-neutral format.
        tests:
          - not_null

      - name: platform_normalized
        description: >
          Social media platform cleaned and normalized to lowercase for consistency.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_not_match_regex:
              arguments:
                regex: '[A-Z]'   

      - name: content_clean
        description: >
          Cleaned content of the social media post with whitespace trimmed. Represents the
          original text submitted by the user after preprocessing.
        tests:
          - not_null

      - name: sentiment
        description: >
          Standardized sentiment classification mapped to one of three categories:
          'positive', 'negative', or 'neutral'. Derived from multiple raw variants such
          as 'pos', '1', '+', 'neg', '-1', etc.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ['positive', 'negative', 'neutral']

  # ========== SNAPSHOTS ==========

snapshots:
  - name: customers_data_snapshot
    description: >
      SCD2 snapshot storing historical versions of customer records.
    columns:
      - name: dbt_scd_id
        description: Surrogate SCD Type 2 identifier.
        tests:
          - unique
          - not_null

      - name: dbt_valid_from
        description: Start timestamp of the record's validity window.
        tests:
          - not_null

      - name: dbt_valid_to
        description: End timestamp of the validity window (NULL = active).
  
  - name: products_snapshot
    description: >
      SCD2 snapshot storing historical versions of product records.
    columns:
      - name: ProductID
        description: Source-system product identifier.
        tests:
          - not_null
      - name: ProductName
        description: Product display name.
      - name: Category
        description: Product category or classification.
      - name: Stock
        description: On-hand stock quantity.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: UnitPrice
        description: Unit price for the product.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: dbt_scd_id
        description: dbt-generated SCD Type 2 surrogate key.
        tests:
          - unique
          - not_null
      - name: dbt_valid_from
        description: Start timestamp when this version became effective.
        tests:
          - not_null
      - name: dbt_valid_to
        description: End timestamp when this version was superseded (NULL if current).
